services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: verdantcare-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: node build.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PATIENT_PORTAL_URL
        sync: false
      - key: STAFF_PORTAL_URL
        sync: false

  # ─── Patient Portal (static site) ──────────────────────────────────────────
  - type: web
    name: verdantcare-patient
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install --prefix client --include=dev && npx --yes vite build -- --outDir dist --config client/vite.config.js client
    staticPublishDir: client/dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_STAFF_PORTAL_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false

  # ─── Staff Portal (static site) ────────────────────────────────────────────
  - type: web
    name: verdantcare-staff
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install --prefix staff-portal --include=dev && npx --yes vite build -- --outDir dist --config staff-portal/vite.config.js staff-portal
    staticPublishDir: staff-portal/dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_PATIENT_PORTAL_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
