# ──────────────────────────────────────────────────────────────
# VerdantCare Medical Center — Full-Stack Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   Production:  docker compose up -d
#   Dev:         docker compose --profile dev up -d
#   Build only:  docker compose build
#   Logs:        docker compose logs -f server
# ──────────────────────────────────────────────────────────────

services:
  # ──── Database ──────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: verdantcare-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: verdantcare
      MONGO_INITDB_ROOT_PASSWORD: verdantcare_password
      MONGO_INITDB_DATABASE: verdantcare_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - verdantcare-net

  # ──── Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: verdantcare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - verdantcare-net

  # ──── Express API Server ────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: verdantcare-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://verdantcare:verdantcare_password@mongo:27017/verdantcare_db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID:-}
      TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@verdantcare.com}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verdantcare-net

  # ──── React Frontend (Nginx) ───────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: verdantcare-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - verdantcare-net

  # ──── Dev Profile (hot-reload with nodemon + vite) ──────
  server-dev:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: verdantcare-server-dev
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${SERVER_PORT:-5000}:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://verdantcare:verdantcare_password@mongo:27017/verdantcare_db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_URL: http://localhost:${CLIENT_PORT:-5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID:-}
      TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@verdantcare.com}
    volumes:
      - ./server/src:/app/src
      - ./server/logs:/app/logs
    command: npx nodemon src/server.js
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verdantcare-net

  client-dev:
    image: node:20-alpine
    container_name: verdantcare-client-dev
    restart: unless-stopped
    profiles:
      - dev
    working_dir: /app
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:${SERVER_PORT:-5000}/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - server-dev
    networks:
      - verdantcare-net

volumes:
  mongo_data:
  redis_data:

networks:
  verdantcare-net:
    driver: bridge

